name: Release

on:
  workflow_dispatch:
    inputs:
      releaseType:
        description: Release increment strategy
        required: true
        default: auto
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
          - prepatch
          - prerelease

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create release commit and tag with changelogen
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          flag=""
          case "${{ inputs.releaseType }}" in
            auto) ;;
            patch|minor|major|prepatch|prerelease) flag="--${{ inputs.releaseType }}" ;;
            *)
              echo "Unsupported release type: ${{ inputs.releaseType }}"
              exit 1
              ;;
          esac

          npx changelogen --release --push --clean $flag

      - name: Sync GitHub Release notes from CHANGELOG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx changelogen gh release --token "$GITHUB_TOKEN"
