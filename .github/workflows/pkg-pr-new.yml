name: pkg.pr.new

on:
  pull_request:
  push:
    branches:
      - "**"
    tags-ignore:
      - "**"

permissions: {}

jobs:
  publish-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Publish preview package
        run: pnpm dlx pkg-pr-new publish --pnpm
