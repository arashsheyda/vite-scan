name: Bug Report
description: Report a bug or unexpected behavior in vite-scan
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to file a bug report. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Steps to reproduce the behavior, or a link to a minimal reproduction.
      placeholder: |
        1. Configure vite-scan with ...
        2. Open DevTools ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Run `npx envinfo --system --binaries --browsers` and paste the output.
      render: shell
    validations:
      required: true

  - type: input
    id: vite-scan-version
    attributes:
      label: vite-scan version
      placeholder: e.g. 0.1.0
    validations:
      required: true

  - type: input
    id: vite-version
    attributes:
      label: Vite version
      placeholder: e.g. 6.0.0
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, screenshots, or logs about the problem.
